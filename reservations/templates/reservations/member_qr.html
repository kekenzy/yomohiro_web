{% extends 'reservations/base.html' %}

{% block title %}会員QRコード - 予約システム{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5 text-center">
        <div class="card border-warning">
            <div class="card-header bg-warning text-dark">
                <h2 class="card-title mb-0">
                    <i class="fas fa-qrcode"></i> 会員QRコード
                </h2>
            </div>
            <div class="card-body py-4">
                <p class="text-muted small mb-3">{{ profile.full_name }} 様</p>
                <div class="mx-auto" style="max-width: min(480px, 100%);">
                    <div class="p-2 p-sm-3 bg-white border rounded shadow-sm">
                        <img src="{% url 'reservations:member_qr_image' %}" alt="会員QRコード" class="img-fluid w-100 d-block" style="height: auto;">
                    </div>
                </div>
                <p class="text-muted small mt-3 mb-0">
                    施設での確認・チェックイン等にご利用ください。
                </p>
                <div class="mt-4">
                    <a href="{% url 'reservations:index' %}" class="btn btn-outline-secondary me-2">
                        <i class="fas fa-home"></i> ホーム
                    </a>
                    <a href="{% url 'reservations:user_profile' %}" class="btn btn-outline-warning">
                        <i class="fas fa-user-circle"></i> ユーザー情報
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
