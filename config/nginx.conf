server {
    # default_server: Host が IP のときもこのブロックに入る（ドメイン名のみだと別 default に流れることがある）
    listen 80 default_server;
    # 静的 IP は Lightsail のグローバル IP に合わせて変更可
    server_name 54.178.68.240 yomohirokan.com www.yomohirokan.com;

    # HTTPアクセスのみ（SSL証明書設定前）

    # Let's Encrypt HTTP-01（certbot --webroot 用）
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $yomohiro_forwarded_proto;
        proxy_redirect off;
        
        # HTTP環境でのセキュリティヘッダーを調整
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
    }

    location /static/ {
        alias /home/ubuntu/yomohiro_web/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/ubuntu/yomohiro_web/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ログ設定
    access_log /var/log/nginx/yomohiro_access.log;
    error_log /var/log/nginx/yomohiro_error.log;
}

# Cloudflare「フル / フル（厳密）」はオリジンへ HTTPS で接続する。443 が無いと 503 になる。
# 以下は Cloudflare フル用の自己署名（ブラウザ→Cloudflare の TLS は別。オリジン検証用）。
# Let's Encrypt 取得後は setup_ssl.sh の nginx_ssl.conf に差し替えてよい。
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 54.178.68.240 yomohirokan.com www.yomohirokan.com;

    ssl_certificate /etc/nginx/ssl/cloudflare_origin.crt;
    ssl_certificate_key /etc/nginx/ssl/cloudflare_origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $yomohiro_forwarded_proto;
        proxy_redirect off;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
    }

    location /static/ {
        alias /home/ubuntu/yomohiro_web/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/ubuntu/yomohiro_web/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/yomohiro_ssl_access.log;
    error_log /var/log/nginx/yomohiro_ssl_error.log;
}

